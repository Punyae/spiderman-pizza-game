<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spider-Pizza</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 style="text-align: center;">Spider-Pizza</h1>
    
    <div style="display: flex; justify-content: center;">
        <canvas id="gameCanvas" width="400" height="400" style="border: 2px solid black; background-color: #f0f0f0;"></canvas>
    </div>
<div id="volume-container" style="margin: 10px 0; font-family: Arial, sans-serif;">
    <label for="volumeSlider" style="font-weight: bold; margin-right: 8px;">🔊 Volume:</label>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.1" value="0.5">
    <span id="volumeValue">50%</span>
</div>

    <script src="script.js"></script>
</body>
</html>
